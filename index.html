<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal App</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#081a33,#030b18);
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:16px;
}
.vip{
  background:#ffd600;
  color:black;
  padding:6px 14px;
  border-radius:14px;
  font-weight:600;
}

.container{
  padding:16px;
  max-width:420px;
  margin:auto;
}

.card{
  background:#102a54;
  padding:16px;
  border-radius:18px;
  margin-bottom:16px;
}

/* BUTTON */
.main-btn{
  width:100%;
  height:56px;
  border:none;
  border-radius:16px;
  background:#3b6ef5;
  color:white;
  font-size:18px;
  font-weight:600;
  cursor:pointer;
}

/* TRADES */
.trade-row{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  font-size:14px;
}
.green{color:#00ff9d;}
.red{color:#ff5c5c;}

.hidden{display:none;}

/* LOADER */
.loader{
  border:4px solid #eee;
  border-top:4px solid #3b6ef5;
  border-radius:50%;
  width:40px;
  height:40px;
  animation:spin 1s linear infinite;
  margin:20px auto;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* CHART */
.chart-box{
  height:240px;
}

/* BLOCKS */
.signal-box{
  width:100%;
  height:56px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  font-size:18px;
  margin-top:12px;

  opacity:0;
  transform:translateY(-12px);
  transition:all .4s ease;
}
.signal-box.show{
  opacity:1;
  transform:translateY(0);
}

.pair-box{
  background:#3b6ef5;
  font-size:22px;
}

.time-box{
  background:#2a4475;
  font-size:20px;
}

.buy-box{
  background:#00c853;
  color:#00210f;
  font-size:20px;
}

.sell-box{
  background:#ff3d3d;
  color:#1a0000;
  font-size:20px;
}

/* BACK */
.back-btn{
  width:100%;
  height:52px;
  margin-top:14px;
  border:none;
  border-radius:16px;
  background:#2a4475;
  color:white;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div>LOGO</div>
  <div class="vip">VIP Status</div>
</div>

<div class="container">

<div class="card">
  <button id="mainBtn" class="main-btn" onclick="startSignal()">Get Signal</button>
  <p id="signalsLeft" style="opacity:0.8;margin-top:10px;text-align:center;">Signals left today: 10/10</p>
</div>

<div class="card">
  <div id="tradeList"></div>
</div>

<div id="loading" class="card hidden">
  <div class="loader"></div>
  <p style="text-align:center;">Analyzing... this may take up to 1 minute</p>
</div>

<div id="signalBlock" class="card hidden">

  <div id="chart" class="chart-box"></div>

  <div id="pairBox" class="signal-box pair-box"></div>
  <div id="timeBox" class="signal-box time-box"></div>
  <div id="resultBox" class="signal-box"></div>

  <button class="back-btn" onclick="resetApp()">Back</button>
</div>

</div>

<script>

let signals = 10;

const pairs=[
"EUR/USD","GBP/USD","USD/JPY","USD/CHF","AUD/USD","USD/CAD","NZD/USD",
"EUR/GBP","EUR/JPY","EUR/CHF","EUR/AUD","EUR/CAD",
"GBP/JPY","GBP/CHF","GBP/AUD","GBP/CAD",
"AUD/JPY","AUD/CAD","AUD/CHF",
"CAD/JPY","CAD/CHF","CHF/JPY","NZD/JPY"
];

// TRADES
function createTrade(){
  let isWin=Math.random()<0.8;
  let id=Math.floor(Math.random()*9000+1000)+"****";
  let value=isWin
    ?(Math.random()*91+7).toFixed(2)
    :[5,10,15,20][Math.floor(Math.random()*4)];

  return `
  <div class="trade-row">
    <div>Trader ID ${id}</div>
    <div class="${isWin?'green':'red'}">
      ${isWin?'+':'-'}${value}$
    </div>
  </div>`;
}

function initTrades(){
  const list=document.getElementById("tradeList");
  list.innerHTML="";
  for(let i=0;i<5;i++){
    list.insertAdjacentHTML("beforeend",createTrade());
  }
}

// SIGNAL COUNT
function updateSignals(){
  document.getElementById("signalsLeft").innerText=`Signals left today: ${signals}/10`;
  if(signals<=0){
    document.getElementById("mainBtn").disabled=true;
    document.getElementById("mainBtn").innerText="No signals";
  }
}

// START
function startSignal(){
  if(signals<=0)return;

  signals--;
  updateSignals();

  resetVisuals();

  document.getElementById("loading").classList.remove("hidden");

  setTimeout(()=>{
    document.getElementById("loading").classList.add("hidden");
    runSignal();
  },2500);
}

// FLOW
function runSignal(){

  const pair=pairs[Math.floor(Math.random()*pairs.length)];
  const minutes=[2,3,4,5][Math.floor(Math.random()*4)];
  const isBuy=Math.random()>0.5;

  document.getElementById("signalBlock").classList.remove("hidden");

  // chart (важно с задержкой)
  setTimeout(()=>{
    document.getElementById("chart").innerHTML="";
    new TradingView.widget({
      container_id:"chart",
      symbol:pair.replace('/',''),
      interval:"1",
      width:"100%",
      height:240
    });
  },200);

  // pair
  setTimeout(()=>{
    let el=document.getElementById("pairBox");
    el.innerText=pair;
    el.classList.add("show");
  },600);

  // time
  setTimeout(()=>{
    const now=new Date();
    now.setMinutes(now.getMinutes()+minutes);

    const t=
      String(now.getHours()).padStart(2,'0')+":"+
      String(now.getMinutes()).padStart(2,'0');

    let el=document.getElementById("timeBox");
    el.innerText=t;
    el.classList.add("show");
  },2500);

  // signal
  setTimeout(()=>{
    let el=document.getElementById("resultBox");
    el.innerText=isBuy?"BUY ↑":"SELL ↓";
    el.classList.add("show");
    el.classList.add(isBuy?"buy-box":"sell-box");
  },4500);
}

// RESET
function resetVisuals(){
  document.getElementById("chart").innerHTML="";
  document.getElementById("pairBox").className="signal-box pair-box";
  document.getElementById("timeBox").className="signal-box time-box";
  document.getElementById("resultBox").className="signal-box";
}

function resetApp(){
  document.getElementById("signalBlock").classList.add("hidden");
}

// INIT
initTrades();
updateSignals();

</script>

</body>
</html>
