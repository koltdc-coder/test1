<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal App</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui,sans-serif;
  background:#0b1220;
  color:#e8eef6;
}

.container{
  padding:16px;
  max-width:420px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* TOP BAR */
.status{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  background:linear-gradient(180deg,#0f1a2a,#0d1726);
  border-radius:16px;
  border:1px solid #1f2c45;
}
.vip-label{
  font-weight:600;
}
.connected{
  font-weight:600;
  color:#9bd1b4;
}

/* CARD */
.card{
  background:#0e1828;
  border-radius:16px;
  border:1px solid #1f2c45;
  padding:16px;
}

.main-btn{
  width:100%;
  height:56px;
  border:none;
  border-radius:16px;
  background:#3b6ef5;
  color:white;
  font-size:18px;
  font-weight:600;
  cursor:pointer;
}

/* TRADES */
.trades-card{overflow:hidden;}
#tradeList{display:flex;flex-direction:column;}

.trade-row{
  display:flex;
  justify-content:space-between;
  padding:10px 14px;
  border-bottom:1px dashed rgba(255,255,255,.06);
  font-size:14px;
  opacity:0;
  transform:translateY(-20px);
  transition:all .5s ease;
}
.trade-row.show{
  opacity:1;
  transform:translateY(0);
}
.green{color:#22c55e;font-weight:700;}
.red{color:#ff5c5c;}

/* LOADER OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  flex-direction:column;
}
.loader{
  border:4px solid #eee;
  border-top:4px solid #3b6ef5;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* CHART */
.chart-wrapper{
  border-radius:6px;
  overflow:hidden;
}
.chart-box{height:240px;}

/* SIGNAL */
.signal-box{
  height:56px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  font-size:18px;
  margin-top:12px;

  opacity:0;
  transform:translateY(-20px);
  transition:.5s;
}
.signal-box.show{
  opacity:1;
  transform:translateY(0);
}

.pair-box{background:#3b6ef5;font-size:22px;cursor:pointer;}
.time-box{background:#2a4475;}
.buy-box{background:#00c853;color:#00210f;}
.sell-box{background:#ff3d3d;color:#1a0000;}

.back-btn{
  width:100%;
  height:52px;
  margin-top:14px;
  border:none;
  border-radius:16px;
  background:#2a4475;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="container">

<div class="status">
  <div class="vip-label">VIP Status</div>
  <div class="connected">Connected</div>
</div>

<div id="startBlock" class="card">
  <button class="main-btn" onclick="startSignal()">Get Signal</button>
</div>

<!-- СИГНАЛ ТЕПЕРЬ ВЫШЕ -->
<div id="signalBlock" class="card hidden">
  <div class="chart-wrapper">
    <div id="chart" class="chart-box"></div>
  </div>

  <div id="pairBox" class="signal-box pair-box"></div>
  <div id="timeBox" class="signal-box time-box"></div>
  <div id="resultBox" class="signal-box"></div>

  <button class="back-btn" onclick="resetApp()">Back</button>
</div>

<!-- ТРЕЙДЫ НИЖЕ -->
<div class="card trades-card">
  <div id="tradeList"></div>
</div>

</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay hidden">
  <div class="loader"></div>
  <p>Analyzing...</p>
</div>

<script>

const pairs=["EUR/USD","GBP/USD","USD/JPY","USD/CHF","AUD/USD","USD/CAD","NZD/USD",
"EUR/GBP","EUR/JPY","EUR/CHF","EUR/AUD","EUR/CAD",
"GBP/JPY","GBP/CHF","GBP/AUD","GBP/CAD",
"AUD/JPY","AUD/CAD","AUD/CHF",
"CAD/JPY","CAD/CHF","CHF/JPY","NZD/JPY"];

/* TRADES */
function createTrade(){
  let isWin=Math.random()<0.8;
  let id=Math.floor(Math.random()*9000+1000)+"****";
  let value=isWin?(Math.random()*91+7).toFixed(2):[5,10,15,20][Math.floor(Math.random()*4)];

  let div=document.createElement("div");
  div.className="trade-row";
  div.innerHTML=`<div>ID ${id}</div>
  <div class="${isWin?'green':'red'}">${isWin?'+':'-'}${value}$</div>`;
  return div;
}

function initTrades(){
  const list=document.getElementById("tradeList");
  for(let i=0;i<5;i++){
    let el=createTrade();
    list.appendChild(el);
    setTimeout(()=>el.classList.add("show"),50);
  }
  loopTrades();
}

function loopTrades(){
  setTimeout(()=>{
    const list=document.getElementById("tradeList");
    let el=createTrade();
    list.prepend(el);
    setTimeout(()=>el.classList.add("show"),50);

    if(list.children.length>5){
      let last=list.lastElementChild;
      last.remove();
    }
    loopTrades();
  },4000+Math.random()*3000);
}

/* SIGNAL */
async function startSignal(){

  document.getElementById("overlay").classList.remove("hidden");

  await wait(3000);

  document.getElementById("overlay").classList.add("hidden");

  document.getElementById("startBlock").classList.add("hidden");
  document.getElementById("signalBlock").classList.remove("hidden");

  runSignal();
}

async function runSignal(){

  const pair=pairs[Math.floor(Math.random()*pairs.length)];
  const minutes=[2,3,4,5][Math.floor(Math.random()*4)];
  const isBuy=Math.random()>0.5;

  new TradingView.widget({
    container_id:"chart",
    symbol:pair.replace('/',''),
    interval:"1",
    width:"100%",
    height:240
  });

  await wait(800);
  let pairEl=document.getElementById("pairBox");
  pairEl.innerText=pair;
  pairEl.classList.add("show");

  await wait(3000);
  const now=new Date();
  now.setMinutes(now.getMinutes()+minutes);

  const t=String(now.getHours()).padStart(2,'0')+":"+String(now.getMinutes()).padStart(2,'0');

  let timeEl=document.getElementById("timeBox");
  timeEl.innerText=t;
  timeEl.classList.add("show");

  await wait(3000);
  let resEl=document.getElementById("resultBox");
  resEl.innerText=isBuy?"BUY ↑":"SELL ↓";
  resEl.className="signal-box show "+(isBuy?"buy-box":"sell-box");
}

/* COPY */
document.getElementById("pairBox").onclick=()=>{
  navigator.clipboard.writeText(document.getElementById("pairBox").innerText);
};

function wait(ms){return new Promise(r=>setTimeout(r,ms));}

function resetApp(){
  document.getElementById("signalBlock").classList.add("hidden");
  document.getElementById("startBlock").classList.remove("hidden");

  document.getElementById("chart").innerHTML="";
  document.getElementById("pairBox").className="signal-box pair-box";
  document.getElementById("timeBox").className="signal-box time-box";
  document.getElementById("resultBox").className="signal-box";
}

initTrades();

</script>

</body>
</html>
